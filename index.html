    <!-- LOGIC SCRIPT -->
    <script>
        const modal = document.getElementById('clueModal');
        const modalContent = document.getElementById('modalContent');
		const buttonsContent = document.getElementById('choicesContainer');
        let currentButton = null;
        let teams = []; // Holds team score data: [{ name: "Team 1", score: 0 }, ...]
        let activeTeamIndex = 0; // Tracks whose turn it is to answer
        let currentClueValue = 200; // Track the value of the active grid button (e.g. 200, 400)
function initializeGame() {
    // 1. Ask how many teams are playing
    let numTeams = parseInt(prompt("How many teams are playing? (1-4)", "2"));
    if (isNaN(numTeams) || numTeams < 1) numTeams = 2; // Default fallback

    const scoreboardContainer = document.getElementById('scoreboardContainer');
    scoreboardContainer.innerHTML = ''; // Clear any placeholders

    // 2. Loop and construct each team's score tracking object & HTML structure
    for (let i = 0; i < numTeams; i++) {
        teams.push({ name: `Team ${i + 1}`, score: 0 });

        // Create the individual scoreboard card
        const teamCard = document.createElement('div');
        teamCard.className = 'team-card';
        teamCard.id = `team-card-${i}`;
        if (i === 0) teamCard.classList.add('active-turn'); // Team 1 starts

        teamCard.innerHTML = `
            <h3>Team ${i + 1}</h3>
            <div class="score" id="score-val-${i}">$0</div>
            <div class="score-adjusters">
                <button onclick="adjustScore(${i}, ${1})">+</button>
                <button onclick="adjustScore(${i}, ${-1})">-</button>
            </div>
        `;
        scoreboardContainer.appendChild(teamCard);
    }
}

// Automatically fire setup when the window loads
window.onload = initializeGame;
function adjustScore(teamIndex, direction) {
    // direction is either 1 (add) or -1 (subtract)
    teams[teamIndex].score += (currentClueValue * direction);
    
    // Update the visual scoreboard layout
    const scoreElement = document.getElementById(`score-val-${teamIndex}`);
    const scoreVal = teams[teamIndex].score;
    
    // Format negative scores properly like -$200 or $200
    scoreElement.textContent = scoreVal < 0 ? `-$${Math.abs(scoreVal)}` : `$${scoreVal}`;
}

        function openClue(button, clueText,choicesArray, correctIndex,pointValue) {
            currentClueValue = pointValue; // Save the points up for grabs
            currentButton = button;
            modalContent.textContent = clueText;
			choicesContainer.innerHTML ='';
            modal.style.display = 'flex';
			choicesArray.forEach((choiceText, index) => {
				const choiceBtn = document.createElement('button');
				choiceBtn.textContent = choiceText;
				choiceBtn.style.padding = '8px';
				choiceBtn.style.cursor = 'pointer';
				choiceBtn.onclick = function() {
					checkAnswer(index, correctIndex, choiceBtn);
				};
				choicesContainer.appendChild(choiceBtn);
			});
        }
       	 function checkAnswer(selectedIndex, correctIndex, clickedButton) {
				 const allChoiceButtons = choicesContainer.querySelectorAll('button');

				  // Disable all choice buttons immediately so the player can't click multiple options
 					 allChoiceButtons.forEach(btn => btn.disabled = true);

				  if (selectedIndex === correctIndex) {
  					  clickedButton.style.backgroundColor = 'lightgreen'; // Correct answer turns green
					  } 
				  else {
   					 clickedButton.style.backgroundColor = 'lightcoral'; // Chosen incorrect answer turns red
   					 allChoiceButtons[correctIndex].style.backgroundColor = 'lightgreen'; // Show the right answer anyway
  					}
			}

		function closeClue() {
 			 modal.style.display = 'none';
 			 if (currentButton) {
    		// Dim out and clear out the point value after viewing
   			 currentButton.classList.add('disabled');
   			 currentButton.disabled = true; // Programmatically disable the game board button
  			}	
}
// --- AUTOMATIC TURN SWAPPER ---
    // Remove active styling from the old team
    document.getElementById(`team-card-${activeTeamIndex}`).classList.remove('active-turn');
    
    // Move to the next team rotationally
    activeTeamIndex = (activeTeamIndex + 1) % teams.length;
    
    // Add active styling to the new team
    document.getElementById(`team-card-${activeTeamIndex}`).classList.add('active-turn');
    </script>
